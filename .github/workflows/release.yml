name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src/server -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: List bundle output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse "src/server/target/release/bundle" | Select-Object FullName

      - name: Find installers and build latest.json
        id: build_json
        shell: pwsh
        run: |
          $bundle  = "src/server/target/release/bundle"
          $version = "${{ github.ref_name }}".TrimStart("v")
          $tag     = "${{ github.ref_name }}"
          $repo    = "${{ github.repository }}"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          # Find installer files
          $msi     = Get-ChildItem -Recurse "$bundle" -Filter "*.msi"     | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $msisig  = Get-ChildItem -Recurse "$bundle" -Filter "*.msi.sig" | Select-Object -First 1
          $nsis    = Get-ChildItem -Recurse "$bundle" -Filter "*.exe"     | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $nsisig  = Get-ChildItem -Recurse "$bundle" -Filter "*.exe.sig" | Select-Object -First 1

          Write-Host "MSI:      $($msi?.FullName)"
          Write-Host "MSI SIG:  $($msisig?.FullName)"
          Write-Host "NSIS:     $($nsis?.FullName)"
          Write-Host "NSIS SIG: $($nsisig?.FullName)"

          # Pick best available sig
          $chosenInstaller = if ($nsisig) { $nsis } else { $msi }
          $chosenSig       = if ($nsisig) { $nsisig } else { $msisig }

          # Build latest.json — sig is empty string if not available
          $sig = if ($chosenSig) { (Get-Content $chosenSig.FullName -Raw).Trim() } else { "" }
          $url = "https://github.com/$repo/releases/download/$tag/$($chosenInstaller.Name)"

          $json = [ordered]@{
            version  = $version
            pub_date = $pubDate
            notes    = "See the release page for details."
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                url       = $url
                signature = $sig
              }
            }
          } | ConvertTo-Json -Depth 5

          $json | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          Write-Host "latest.json:"
          Get-Content "latest.json"

          # Outputs
          echo "MSI=$($msi.FullName)"   >> $env:GITHUB_OUTPUT
          echo "NSIS=$($nsis.FullName)" >> $env:GITHUB_OUTPUT
          if ($msisig)  { echo "MSI_SIG=$($msisig.FullName)"  >> $env:GITHUB_OUTPUT }
          if ($nsisig)  { echo "NSIS_SIG=$($nsisig.FullName)" >> $env:GITHUB_OUTPUT }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Pos-app ${{ github.ref_name }}
          body: |
            ## What's new in ${{ github.ref_name }}

            See the full changelog for details.
          draft: false
          prerelease: false
          files: |
            ${{ steps.build_json.outputs.MSI }}
            ${{ steps.build_json.outputs.NSIS }}
            latest.json
