name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src/server -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload installers to release
        shell: pwsh
        run: |
          $bundle = "src/server/target/release/bundle"
          $msi    = Get-ChildItem -Recurse "$bundle" -Filter "*.msi"     | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $nsis   = Get-ChildItem -Recurse "$bundle" -Filter "*.exe"     | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $msisig = Get-ChildItem -Recurse "$bundle" -Filter "*.msi.sig" | Select-Object -First 1
          $nsisig = Get-ChildItem -Recurse "$bundle" -Filter "*.exe.sig" | Select-Object -First 1

          Write-Host "Files found:"
          Write-Host "MSI:      $($msi?.Name)"
          Write-Host "NSIS:     $($nsis?.Name)"
          Write-Host "MSI SIG:  $($msisig?.Name)"
          Write-Host "NSIS SIG: $($nsisig?.Name)"

          # Build file list
          $files = @($msi.FullName, $nsis.FullName)
          if ($msisig)  { $files += $msisig.FullName }
          if ($nsisig)  { $files += $nsisig.FullName }

          # Print sig content for manual latest.json creation
          if ($msisig) {
            Write-Host "`nMSI Signature:"
            Get-Content $msisig.FullName
          }
          if ($nsisig) {
            Write-Host "`nNSIS Signature:"
            Get-Content $nsisig.FullName
          }

          $fileList = $files -join "`n"
          echo "FILES=$fileList" >> $env:GITHUB_OUTPUT
        id: files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Pos-app ${{ github.ref_name }}
          body: |
            ## What's new in ${{ github.ref_name }}

            See the full changelog for details.
          draft: false
          prerelease: false
          files: |
            src/server/target/release/bundle/msi/*.msi
            src/server/target/release/bundle/nsis/*.exe
            src/server/target/release/bundle/msi/*.sig
            src/server/target/release/bundle/nsis/*.sig
