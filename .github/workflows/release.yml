name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src/server -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Write .env for signing
        shell: pwsh
        run: |
          $key = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          $pass = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
          $content = "TAURI_SIGNING_PRIVATE_KEY=$key`nTAURI_SIGNING_PRIVATE_KEY_PASSWORD=$pass"
          [System.IO.File]::WriteAllText("$PWD\.env", $content)
          Write-Host "Written .env, key length: $($key.Length)"

      - name: Build Tauri app
        shell: pwsh
        run: npm run tauri build

      - name: Check for sig files
        shell: pwsh
        run: |
          Write-Host "Bundle contents:"
          Get-ChildItem -Recurse "src/server/target/release/bundle" | Select-Object FullName

      - name: Build latest.json
        id: build_json
        shell: pwsh
        run: |
          $bundle  = "src/server/target/release/bundle"
          $version = "${{ github.ref_name }}".TrimStart("v")
          $tag     = "${{ github.ref_name }}"
          $repo    = "${{ github.repository }}"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $msi    = Get-ChildItem -Recurse "$bundle" -Filter "*.msi"     | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $nsis   = Get-ChildItem -Recurse "$bundle" -Filter "*.exe"     | Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $msisig = Get-ChildItem -Recurse "$bundle" -Filter "*.msi.sig" | Select-Object -First 1
          $nsisig = Get-ChildItem -Recurse "$bundle" -Filter "*.exe.sig" | Select-Object -First 1

          $chosenInstaller = if ($nsisig) { $nsis } else { $msi }
          $chosenSig       = if ($nsisig) { $nsisig } else { $msisig }

          $sig = if ($chosenSig) { (Get-Content $chosenSig.FullName -Raw).Trim() } else { "" }
          $url = "https://github.com/$repo/releases/download/$tag/$($chosenInstaller.Name)"

          Write-Host "Signature present: $($sig.Length -gt 0)"
          Write-Host "URL: $url"

          $json = '{"version":"' + $version + '","pub_date":"' + $pubDate + '","notes":"See the release page for details.","platforms":{"windows-x86_64":{"url":"' + $url + '","signature":"' + $sig + '"}}}'
          [System.IO.File]::WriteAllText("$PWD\latest.json", $json)

          Write-Host "latest.json:"
          Get-Content "latest.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Pos-app ${{ github.ref_name }}
          body: |
            ## What's new in ${{ github.ref_name }}

            See the full changelog for details.
          draft: false
          prerelease: false
          files: |
            src/server/target/release/bundle/msi/*.msi
            src/server/target/release/bundle/nsis/*.exe
            latest.json
